<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Defender 4 меню</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #0a0a0a; color: #fff; overflow: hidden; height: 100vh; width: 100vw; }

        /* Login Screen */
        .login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; transition: opacity 0.5s ease; }
        .login-screen.hidden { opacity: 0; pointer-events: none; }
        .login-title { font-size: 48px; margin-bottom: 40px; color: #4fc3f7; text-shadow: 0 0 20px rgba(79, 195, 247, 0.5); animation: glow 2s ease-in-out infinite alternate; }
        @keyframes glow { from { text-shadow: 0 0 20px rgba(79, 195, 247, 0.5); } to { text-shadow: 0 0 30px rgba(79, 195, 247, 0.8), 0 0 40px rgba(79, 195, 247, 0.6); } }
        .login-input { width: 400px; padding: 20px; font-size: 24px; background: rgba(79, 195, 247, 0.1); border: 2px solid #4fc3f7; border-radius: 15px; color: #fff; text-align: center; outline: none; transition: all 0.3s ease; margin-bottom: 20px; }
        .login-input:focus { background: rgba(79, 195, 247, 0.2); box-shadow: 0 0 20px rgba(79, 195, 247, 0.4); }
        .login-btn { padding: 15px 40px; font-size: 20px; background: linear-gradient(135deg, #4fc3f7 0%, #29b6f6 100%); border: none; border-radius: 12px; color: #fff; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(79, 195, 247, 0.4); font-weight: 600; }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(79, 195, 247, 0.6); }
        .error-message { margin-top: 20px; color: #ff5252; font-size: 18px; opacity: 0; transition: opacity 0.3s ease; min-height: 27px; }
        .error-message.show { opacity: 1; }

        /* Main Layout */
        .main-container { display: none; height: 100vh; width: 100vw; flex-direction: column; }
        .main-container.active { display: flex; }
        
        .header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #4fc3f7; box-shadow: 0 4px 20px rgba(79, 195, 247, 0.3); z-index: 10; }
        .header-title { font-size: 28px; color: #4fc3f7; text-shadow: 0 0 15px rgba(79, 195, 247, 0.5); }
        .serial-number { font-size: 16px; color: rgba(255, 255, 255, 0.7); }

        .tabs { display: flex; background: #0f0f1e; border-bottom: 1px solid rgba(79, 195, 247, 0.3); z-index: 10; }
        .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; transition: all 0.3s ease; border-bottom: 3px solid transparent; font-size: 18px; color: rgba(255, 255, 255, 0.6); }
        .tab:hover { background: rgba(79, 195, 247, 0.1); color: #4fc3f7; }
        .tab.active { background: rgba(79, 195, 247, 0.15); border-bottom-color: #4fc3f7; color: #4fc3f7; }

        .content { flex: 1; overflow-y: auto; padding: 20px; background: #0a0a0a; position: relative; }
        .tab-content { display: none; animation: fadeIn 0.4s ease; height: 100%; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Salon Styles */
        .salon-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .control-card { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); border-radius: 15px; padding: 20px; border: 1px solid rgba(79, 195, 247, 0.3); transition: all 0.3s ease; }
        .control-card:hover { border-color: #4fc3f7; box-shadow: 0 0 15px rgba(79, 195, 247, 0.2); }
        .control-title { font-size: 20px; margin-bottom: 15px; color: #4fc3f7; }
        
        .toggle-container { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
        .toggle-switch { position: relative; width: 60px; height: 30px; background: rgba(255, 255, 255, 0.1); border-radius: 15px; cursor: pointer; transition: 0.3s; }
        .toggle-switch.active { background: #4fc3f7; }
        .toggle-slider { position: absolute; top: 3px; left: 3px; width: 24px; height: 24px; background: #fff; border-radius: 50%; transition: 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
        .toggle-switch.active .toggle-slider { left: 33px; }

        .fuel-bar-bg { width: 100%; height: 20px; background: rgba(255, 255, 255, 0.1); border-radius: 10px; overflow: hidden; margin: 10px 0; }
        .fuel-bar-fill { height: 100%; background: linear-gradient(90deg, #ff5252, #ffa726, #66bb6a); width: 100%; transition: width 0.5s; }
        
        .btn { padding: 12px 20px; font-size: 16px; border: none; border-radius: 8px; cursor: pointer; transition: 0.2s; margin: 5px; font-weight: 600; }
        .btn-primary { background: #4fc3f7; color: #000; }
        .btn-secondary { background: rgba(79, 195, 247, 0.2); color: #4fc3f7; border: 1px solid #4fc3f7; }
        .btn:hover { opacity: 0.9; transform: scale(1.02); }

        .window-animation { position: relative; height: 100px; background: rgba(0,0,0,0.5); border-radius: 8px; overflow: hidden; margin-top: 10px; border: 2px solid #4fc3f7; }
        .window-glass { position: absolute; top: 0; left: 0; right: 0; height: 100%; background: rgba(79, 195, 247, 0.2); transition: transform 1s; transform-origin: top; }
        .window-glass.open { transform: scaleY(0); }

        .mode-selector { display: flex; gap: 10px; margin-top: 15px; }
        .mode-btn { flex: 1; padding: 15px; background: rgba(255,255,255,0.05); border: 1px solid #333; border-radius: 10px; text-align: center; cursor: pointer; }
        .mode-btn.active { background: rgba(79, 195, 247, 0.2); border-color: #4fc3f7; color: #4fc3f7; }

        /* Navigator Styles - UPDATED LAYOUT */
        .navigator-layout {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .nav-top-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            background: rgba(26, 26, 46, 0.9);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 15px;
            border: 1px solid rgba(79, 195, 247, 0.3);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .speed-control {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-right: auto; /* Толкает кнопки вправо */
        }

        .speed-input {
            width: 80px;
            padding: 8px;
            background: rgba(0,0,0,0.3);
            border: 1px solid #4fc3f7;
            border-radius: 8px;
            color: #fff;
            text-align: center;
            font-size: 16px;
        }

        .nav-btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .nav-btn {
            padding: 10px 15px;
            font-size: 14px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            white-space: nowrap;
        }

        .nav-btn-action { background: #4fc3f7; color: #000; }
        .nav-btn-go { background: #66bb6a; color: #fff; }
        .nav-btn-clear { background: rgba(255, 82, 82, 0.2); color: #ff5252; border: 1px solid #ff5252; }
        .nav-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }

        #map { 
            flex: 1; 
            width: 100%; 
            border-radius: 15px; 
            border: 2px solid #4fc3f7; 
            min-height: 400px;
            z-index: 1;
        }

        .route-info {
            margin-top: 15px;
            background: rgba(79, 195, 247, 0.1);
            padding: 15px;
            border-radius: 10px;
            display: none;
            border: 1px solid rgba(79, 195, 247, 0.3);
        }

        /* Taxi Styles */
        .taxi-container { max-width: 800px; margin: 0 auto; text-align: center; }
        .taxi-balance { font-size: 48px; color: #4fc3f7; margin: 20px 0; font-weight: bold; }
        .qr-section { margin-top: 30px; background: #fff; padding: 20px; border-radius: 15px; display: inline-block; }
        
        .leaflet-container { background: #0a0a0a !important; }
        .arrow-inner { width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-bottom: 30px solid #4fc3f7; filter: drop-shadow(0 0 10px #4fc3f7); }
    </style>
</head>
<body>
    <!-- Login -->
    <div class="login-screen" id="loginScreen">
        <h1 class="login-title">Defender 4 меню</h1>
        <input type="text" class="login-input" id="serialInput" placeholder="Серийный код (X3972314)">
        <button class="login-btn" id="continueBtn">Продолжить</button>
        <div class="error-message" id="errorMessage">Код не найден в базе данных.</div>
    </div>

    <!-- Main App -->
    <div class="main-container" id="mainContainer">
        <div class="header">
            <h1 class="header-title">Defender 4</h1>
            <div class="serial-number">SN: X3972314</div>
        </div>

        <div class="tabs">
            <div class="tab active" data-tab="salon">Салон</div>
            <div class="tab" data-tab="navigator">Навигатор</div>
            <div class="tab" data-tab="taxi">Такси</div>
        </div>

        <div class="content">
            <!-- SALON -->
            <div class="tab-content active" id="salon">
                <div class="salon-grid">
                    <div class="control-card">
                        <h3 class="control-title">❄️ Кондиционер</h3>
                        <div class="toggle-container">
                            <span>Включить</span>
                            <div class="toggle-switch" id="acToggle"><div class="toggle-slider"></div></div>
                        </div>
                    </div>
                    <div class="control-card">
                        <h3 class="control-title">🚗 Двигатель</h3>
                        <button class="btn btn-primary" style="width:100%" id="startEngine">Завести</button>
                        <div id="engineStatus" style="margin-top:10px; text-align:center; color:#aaa;">Выключен</div>
                    </div>
                    <div class="control-card">
                        <h3 class="control-title">⛽ Бензин</h3>
                        <div class="fuel-bar-bg"><div class="fuel-bar-fill" id="fuelBar"></div></div>
                        <div id="fuelText" style="text-align:center">100%</div>
                        <button class="btn btn-primary" style="width:100%; margin-top:10px;" id="refuelBtn">Заправить</button>
                    </div>
                    <div class="control-card">
                        <h3 class="control-title">🪟 Окна</h3>
                        <button class="btn btn-secondary" id="window1Btn">Окно 1</button>
                        <div class="window-animation"><div class="window-glass" id="window1Glass"></div></div>
                        <button class="btn btn-secondary" id="window2Btn" style="margin-top:5px;">Окно 2</button>
                        <div class="window-animation"><div class="window-glass" id="window2Glass"></div></div>
                    </div>
                    <div class="control-card" style="grid-column: 1/-1;">
                        <h3 class="control-title">🏎️ Режим</h3>
                        <div class="mode-selector">
                            <div class="mode-btn active" onclick="setMode(this, 1)">Обычный</div>
                            <div class="mode-btn" onclick="setMode(this, 2)">Ускоренный (x2)</div>
                            <div class="mode-btn" onclick="setMode(this, 5)">Спорт (x5)</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- NAVIGATOR -->
            <div class="tab-content" id="navigator">
                <div class="navigator-layout">
                    <!-- Верхняя панель с кнопками и скоростью -->
                    <div class="nav-top-controls">
                        <div class="speed-control">
                            <label>Скорость (км/ч):</label>
                            <input type="number" class="speed-input" id="speedInput" value="60" min="10" max="200">
                        </div>
                        
                        <div class="nav-btn-group">
                            <button class="nav-btn nav-btn-action" id="setStartPoint">Старт</button>
                            <button class="nav-btn nav-btn-action" id="setEndPoint">Финиш</button>
                            <button class="nav-btn nav-btn-go" id="buildRoute">Поехали</button>
                            <button class="nav-btn nav-btn-clear" id="clearRoute">Сброс</button>
                        </div>
                    </div>

                    <!-- Карта -->
                    <div id="map"></div>
                    
                    <div class="route-info" id="routeInfo">
                        <p id="routeDistance">Расстояние: --</p>
                        <p id="routeTime">Время: --</p>
                    </div>
                </div>
            </div>

            <!-- TAXI -->
            <div class="tab-content" id="taxi">
                <div class="taxi-container">
                    <div class="control-card">
                        <h3 class="control-title">🚕 Режим такси</h3>
                        <div class="toggle-container">
                            <span>Активировать</span>
                            <div class="toggle-switch" id="taxiToggle"><div class="toggle-slider"></div></div>
                        </div>
                    </div>
                    <div class="taxi-balance" id="taxiBalance">0.00 ₽</div>
                    
                    <div class="control-card">
                        <h3 class="control-title">💳 QR Оплата</h3>
                        <button class="btn btn-primary" onclick="generateQR()">Создать QR</button>
                        <div id="qrContainer" style="margin-top:20px; display:none; justify-content:center;">
                            <div id="qrcode"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let map = null; let startPoint = null; let endPoint = null; let routeLine = null; let arrowMarker = null;
        let isNavigating = false; let fuelLevel = 100; let engineOn = false; let currentMode = 'normal';
        let speedMultiplier = 1; let navigationInterval = null; let fuelInterval = null; let refuelingInterval = null;
        let routeCoordinates = []; let currentRouteIndex = 0;
        let taxiMode = false; let taxiBalance = 0; let taxiEarningInterval = null;
        const CORRECT_CODE = 'X3972314';

        function updateTaxiStatus() {
            if (taxiMode) localStorage.setItem('defender4_taxi_status', 'active');
            else localStorage.setItem('defender4_taxi_status', 'inactive');
        }

        document.getElementById('continueBtn').addEventListener('click', checkSerialCode);
        document.getElementById('serialInput').addEventListener('keypress', function(e) { if (e.key === 'Enter') checkSerialCode(); });

        function checkSerialCode() {
            const input = document.getElementById('serialInput').value.trim();
            const errorMessage = document.getElementById('errorMessage');
            if (input === CORRECT_CODE) {
                document.getElementById('loginScreen').classList.add('hidden');
                setTimeout(() => {
                    document.getElementById('loginScreen').style.display = 'none';
                    document.getElementById('mainContainer').classList.add('active');
                    initializeMap();
                }, 500);
            } else {
                errorMessage.classList.add('show');
                setTimeout(() => { errorMessage.classList.remove('show'); }, 3000);
            }
        }

        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                this.classList.add('active');
                const tabId = this.getAttribute('data-tab');
                document.getElementById(tabId).classList.add('active');
                if (tabId === 'navigator' && map) setTimeout(() => { map.invalidateSize(); }, 100);
            });
        });

        function initializeMap() {
            if (map) return;
            map = L.map('map').setView([55.7558, 37.6173], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap contributors &copy; CARTO', subdomains: 'abcd', maxZoom: 19
            }).addTo(map);
            map.on('click', function(e) {
                if (!startPoint) setStartPoint(e.latlng);
                else if (!endPoint) setEndPoint(e.latlng);
            });
        }

        document.getElementById('setStartPoint').addEventListener('click', function() {
            if (!map) return alert('Сначала перейдите на вкладку Навигатор');
            alert('Кликните на карте: точка СТАРТА');
            startPoint = null; endPoint = null; clearRouteFromMap();
        });
        document.getElementById('setEndPoint').addEventListener('click', function() {
            if (!map) return alert('Сначала перейдите на вкладку Навигатор');
            if (!startPoint) return alert('Сначала установите точку старта');
            alert('Кликните на карте: точка ФИНИША');
        });

        function setStartPoint(latlng) {
            if (startPoint) map.removeLayer(startPoint.marker);
            startPoint = { latlng: latlng, marker: L.marker(latlng, { icon: L.divIcon({ className: 'custom-marker', html: '<div style="background: #4fc3f7; width: 20px; height: 20px; border-radius: 50%; border: 3px solid #fff;"></div>', iconSize: [20, 20], iconAnchor: [10, 10] }) }).addTo(map) };
            map.setView(latlng, 15);
        }
        function setEndPoint(latlng) {
            if (endPoint) map.removeLayer(endPoint.marker);
            endPoint = { latlng: latlng, marker: L.marker(latlng, { icon: L.divIcon({ className: 'custom-marker', html: '<div style="background: #ff5252; width: 20px; height: 20px; border-radius: 50%; border: 3px solid #fff;"></div>', iconSize: [20, 20], iconAnchor: [10, 10] }) }).addTo(map) };
        }

        document.getElementById('buildRoute').addEventListener('click', async function() {
            if (!startPoint || !endPoint) return alert('Установите точки Старта и Финиша');
            if (!engineOn) return alert('Заведите двигатель в Салоне');
            const speed = parseInt(document.getElementById('speedInput').value) || 60;
            try {
                const response = await fetch(`https://router.project-osrm.org/route/v1/driving/${startPoint.latlng.lng},${startPoint.latlng.lat};${endPoint.latlng.lng},${endPoint.latlng.lat}?overview=full&geometries=geojson`);
                const data = await response.json();
                if (data.routes && data.routes.length > 0) {
                    const route = data.routes[0];
                    routeCoordinates = route.geometry.coordinates.map(coord => [coord[1], coord[0]]);
                    if (routeLine) map.removeLayer(routeLine);
                    routeLine = L.polyline(routeCoordinates, { color: '#4fc3f7', weight: 5, opacity: 0.8 }).addTo(map);
                    
                    document.getElementById('routeDistance').textContent = `Расстояние: ${(route.distance/1000).toFixed(1)} км`;
                    document.getElementById('routeTime').textContent = `Время: ~${Math.ceil(route.duration/60)} мин`;
                    document.getElementById('routeInfo').style.display = 'block';
                    
                    map.fitBounds(routeLine.getBounds(), { padding: [50, 50] });
                    createArrowMarker(routeCoordinates[0]);
                    startNavigation(speed);
                }
            } catch (error) { alert('Ошибка маршрута'); }
        });

        function createArrowMarker(position) {
            if (arrowMarker) map.removeLayer(arrowMarker);
            const arrowIcon = L.divIcon({ className: 'arrow-icon', html: '<div class="arrow-inner"></div>', iconSize: [30, 30], iconAnchor: [15, 15] });
            arrowMarker = L.marker(position, { icon: arrowIcon, zIndexOffset: 1000 }).addTo(map);
            currentRouteIndex = 0;
        }

        function startNavigation(baseSpeed) {
            if (isNavigating) return;
            isNavigating = true;
            const actualSpeed = baseSpeed * speedMultiplier;
            const delay = Math.max(50, 1000 / actualSpeed);
            
            navigationInterval = setInterval(() => {
                if (!engineOn || fuelLevel <= 0) {
                    stopNavigation();
                    if (fuelLevel <= 0) alert('Бензин закончился!');
                    return;
                }
                if (currentRouteIndex < routeCoordinates.length - 1) {
                    currentRouteIndex++;
                    const newPos = routeCoordinates[currentRouteIndex];
                    const prevPos = routeCoordinates[currentRouteIndex - 1];
                    const angle = calculateAngle(prevPos, newPos);
                    
                    arrowMarker.setLatLng(newPos);
                    const arrowElement = arrowMarker.getElement().querySelector('.arrow-inner');
                    if (arrowElement) arrowElement.style.transform = `rotate(${angle}deg)`;
                    
                    map.setBearing(angle);
                    map.panTo(newPos, { animate: true, duration: 0.05 });
                    consumeFuel();
                } else { stopNavigation(); alert('Приехали!'); }
            }, delay);
        }

        function calculateAngle(from, to) {
            const dy = to[0] - from[0]; const dx = to[1] - from[1];
            return Math.atan2(dy, dx) * 180 / Math.PI;
        }

        function stopNavigation() {
            isNavigating = false;
            if (navigationInterval) { clearInterval(navigationInterval); navigationInterval = null; }
            if (map) map.setBearing(0);
        }

        document.getElementById('clearRoute').addEventListener('click', function() { clearRouteFromMap(); stopNavigation(); });
        function clearRouteFromMap() {
            if (routeLine) { map.removeLayer(routeLine); routeLine = null; }
            if (arrowMarker) { map.removeLayer(arrowMarker); arrowMarker = null; }
            if (startPoint) { map.removeLayer(startPoint.marker); startPoint = null; }
            if (endPoint) { map.removeLayer(endPoint.marker); endPoint = null; }
            routeCoordinates = []; currentRouteIndex = 0;
            document.getElementById('routeInfo').style.display = 'none';
        }

        document.getElementById('acToggle').addEventListener('click', function() { this.classList.toggle('active'); });

        document.getElementById('startEngine').addEventListener('click', function() {
            if (engineOn) {
                engineOn = false;
                document.getElementById('engineStatus').textContent = 'Выключен';
                this.textContent = 'Завести';
                stopNavigation();
            } else {
                this.disabled = true;
                document.getElementById('engineStatus').textContent = 'Запуск...';
                setTimeout(() => {
                    engineOn = true;
                    document.getElementById('engineStatus').textContent = 'Работает';
                    this.textContent = 'Глушить';
                    this.disabled = false;
                    startFuelConsumption();
                }, 2000);
            }
        });

        function startFuelConsumption() {
            if (fuelInterval) clearInterval(fuelInterval);
            fuelInterval = setInterval(() => {
                if (engineOn && fuelLevel > 0) {
                    fuelLevel -= 0.05;
                    if (fuelLevel < 0) fuelLevel = 0;
                    updateFuelDisplay();
                    if (fuelLevel <= 0) {
                        engineOn = false;
                        document.getElementById('engineStatus').textContent = 'Нет бензина';
                        document.getElementById('startEngine').textContent = 'Завести';
                        stopNavigation();
                        clearInterval(fuelInterval);
                    }
                }
            }, 1000);
        }

        function consumeFuel() { if (fuelLevel > 0) { fuelLevel -= 0.02; if (fuelLevel < 0) fuelLevel = 0; updateFuelDisplay(); } }
        function updateFuelDisplay() {
            document.getElementById('fuelBar').style.width = fuelLevel + '%';
            document.getElementById('fuelText').textContent = Math.round(fuelLevel) + '%';
        }

        document.getElementById('refuelBtn').addEventListener('click', function() {
            if (refuelingInterval) return;
            this.disabled = true;
            refuelingInterval = setInterval(() => {
                fuelLevel += 2;
                if (fuelLevel >= 100) {
                    fuelLevel = 100; clearInterval(refuelingInterval); refuelingInterval = null;
                    this.disabled = false;
                }
                updateFuelDisplay();
            }, 50);
        });

        let window1Open = false; let window2Open = false;
        document.getElementById('window1Btn').addEventListener('click', function() {
            window1Open = !window1Open;
            document.getElementById('window1Glass').classList.toggle('open');
            this.textContent = window1Open ? 'Закрыть 1' : 'Открыть 1';
        });
        document.getElementById('window2Btn').addEventListener('click', function() {
            window2Open = !window2Open;
            document.getElementById('window2Glass').classList.toggle('open');
            this.textContent = window2Open ? 'Закрыть 2' : 'Открыть 2';
        });

        function setMode(el, mult) {
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            speedMultiplier = mult;
        }

        // Taxi Logic
        document.getElementById('taxiToggle').addEventListener('click', function() {
            taxiMode = !taxiMode;
            this.classList.toggle('active');
            updateTaxiStatus();
        });

        function generateQR() {
            const container = document.getElementById('qrContainer');
            const qrDiv = document.getElementById('qrcode');
            if (taxiBalance < 1) return alert('Минимум 1 ₽');
            container.style.display = 'flex';
            qrDiv.innerHTML = '';
            new QRCode(qrDiv, {
                text: JSON.stringify({ type: 'taxi_payment', amount: Math.floor(taxiBalance) }),
                width: 150, height: 150
            });
        }

        // Earnings
        setInterval(() => {
            if (taxiMode && isNavigating && engineOn) {
                taxiBalance += Math.random() * 12;
                document.getElementById('taxiBalance').textContent = taxiBalance.toFixed(2) + ' ₽';
            }
        }, 1000);
    </script>
</body>
</html>
